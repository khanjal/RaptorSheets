    if: ${{ github.event_name == 'workflow_dispatch' || contains(join(github.event.pull_request.labels.*.name, ','), 'copilot-review') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

